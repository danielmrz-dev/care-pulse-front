<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CarePulse - Recuperar senha</title>
    
    <link rel="stylesheet" href="recuperar-senha.css"/>
    <link rel="stylesheet" href="../../styles/global.css">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <main>
      <section
        class="recuperar-senha-form d-flex flex-column gap-4 justify-content-center position-absolute top-50 start-50 translate-middle"
      >
        <img src="../../assets/images/carepulse-logo.png" alt="" class="logo align-self-center" />
        <h1 class="text-center">Recuperar senha</h1>
        <form>
          <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label"
              >Email</label
            >
            <input
              type="email"
              class="form-control"
              id="exampleInputEmail1"
              aria-describedby="emailHelp"
              placeholder="Digite seu email"
            />
          </div>
          <button type="submit" class="btn btn-primary w-100 mt-2">Enviar</button>
          <p class="text-center mt-3">
            <a class="link-opacity-100-hover" href="../../index.html">
              Voltar para a tela de login
            </a>
          </p>
        </form>
      </section>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
