<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CarePulse - Perfil</title>
    <link rel="stylesheet" href="../../styles/global.css" />
    <link rel="stylesheet" href="perfil.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="p-4 d-flex flex-column gap-4">
    <header class="d-flex align-items-center justify-content-between">
      <img
        src="../../assets/images/carepulse-logo.png"
        alt=""
        class="logo align-self-center"
      />
      <img
        src="../../assets/images/circle-user-regular-full.svg"
        alt=""
        class="user-logo align-self-center"
      />
    </header>
    <main class="d-flex align-items-center justify-content-center flex-wrap main-content">
      <div class="wrapper">
        <div class="wrapper-child">
          <div class="card p-3 d-flex flex-column gap-3">
            <h5 class="card-title m-0 pb-2">Perfil</h5>
            <div class="card-body d-flex flex-column gap-2 p-0">
              <div class="d-flex flex-column align-items-center gap-2 text-size">
                <img src="../../assets/images/avatar-avatar.png" alt="" class="rounded-circle avatar">
                <h3 class="card-title m-0">João da Silva</h3>
                <p class="card-text m-0 bg-primary rounded text-white px-3 py-1">Nível atual: 5</p>
                <p class="card-text m-0">Pontos totais: <strong>500</strong></p>
              </div>
            </div>
          </div>
        </div>
        <div class="wrapper-child card p-3 d-flex flex-column gap-3 shadow-sm">
          <div class="card-body d-flex flex-column gap-2 p-0">
            <div class="d-flex flex-column align-items-center gap-2 text-size">
              <h5 class="card-title m-0">Dados pessoais</h5>
              <div class="d-flex w-100 gap-2">
                <img src="../../assets/images/user-solid-full.svg" alt="" class="personal-data-icon">
                <div>
                  <p class="card-text opacity-50 m-0">Nome</p>
                  <p class="card-title m-0">João da Silva</p>
                </div>
              </div>
              <div class="d-flex w-100 gap-2">
                <img src="../../assets/images/envelope-solid-full.svg" alt="" class="personal-data-icon">
                <div>
                  <p class="card-text opacity-50 m-0">Email</p>
                  <p class="card-title m-0">joao@silva.com</p>
                </div>
              </div>
              <div class="d-flex w-100 gap-2">
                <img src="../../assets/images/phone-solid-full.svg" alt="" class="personal-data-icon">
                <div>
                  <p class="card-text opacity-50 m-0">Telefone</p>
                  <p class="card-title m-0">(11) 99999-9999</p>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="wrapper-child card p-3 d-flex flex-column gap-3 shadow-sm">
          <div class="card-body d-flex flex-column gap-2 p-0">
            <div class="d-flex flex-column align-items-center gap-2 text-size">
              <h5 class="card-title m-0">Informações de saúde</h5>
              <div class="d-flex w-100 gap-2">
                <img src="../../assets/images/heart-pulse-solid-full.svg" alt="" class="personal-data-icon">
                <div>
                  <p class="card-text opacity-50 m-0">Plano de saúde</p>
                  <p class="card-title m-0">João da Silva</p>
                </div>
              </div>
              <div class="d-flex w-100 gap-2">
                <img src="../../assets/images/list-solid-full.svg" alt="" class="personal-data-icon">
                <div class="d-flex align-items-center w-100 justify-content-between">
                  <p class="card-text opacity-50 m-0">Histórico de consultas</p>
                  <button class="go-to-history-btn" type="button">
                    Ver histórico
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
        
    </main>
    <footer>
      <div
        class="bg-primary w-100 position-fixed bottom-0 start-0 rounded-top d-flex justify-content-around"
      >
        <a href="../inicio/inicio.html" class="footer-link d-flex flex-column align-items-center text-decoration-none">
          <img
            class="footer-link-icon"
            src="../../assets/images/house-solid-full.svg"
          />
          Início
        </a>
        <a href="./../consultas/consultas.html" class="footer-link d-flex flex-column align-items-center text-decoration-none">
          <img
            class="footer-link-icon"
            src="../../assets/images/user-doctor-solid-white.svg"
          />
          Consultas
        </a>
        <a href="" class="footer-link d-flex flex-column align-items-center text-decoration-none">
          <img
            class="footer-link-icon"
            src="../../assets/images/trophy-solid-white.svg"
          />
          Recompensas
        </a>
        <a href="./../perfil/perfil.html" class="footer-link d-flex flex-column align-items-center text-decoration-none">
          <img
            class="footer-link-icon"
            src="../../assets/images/circle-user-solid-white.svg"
          />
          Meu perfil
        </a>
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
