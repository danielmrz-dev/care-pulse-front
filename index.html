<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CarePulse</title>
    <link rel="stylesheet" href="styles/global.css" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <main>
      <section
        class="login-form d-flex flex-column gap-4 justify-content-center position-absolute top-50 start-50 translate-middle"
      >
        <img
          src="assets/images/carepulse-logo.png"
          alt=""
          class="logo align-self-center"
        />
        <h1 class="text-center">
          Login
          <img
            src="assets/images/circle-info-solid-full.svg"
            alt=""
            class="info-icon"
            data-bs-toggle="tooltip"
            data-bs-placement="right"
            data-bs-title="Email: email@email.com Senha: 123456"
          />
        </h1>
        <form>
          <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              id="exampleInputEmail1"
              aria-describedby="emailHelp"
              placeholder="Digite seu email"
              data-id="email-field"
            />
          </div>
          <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Senha</label>
            <input
              type="password"
              class="form-control"
              id="exampleInputPassword1"
              placeholder="Digite sua senha"
              data-id="password-field"
            />
          </div>
          <button data-id="login-button" class="login-btn" type="button">
            Entrar
          </button>
          <p class="text-center mt-3">
            <a
              class="link-opacity-100-hover"
              href="pages/recuperar-senha/recuperar-senha.html"
            >
              Esqueceu a senha?
            </a>
          </p>
        </form>
      </section>
    </main>
    <footer>
      <p
        class="text-center position-fixed w-100 bottom-0 d-flex align-items-center justify-content-center gap-1"
      >
        <span class="fs-5">©</span>
        CarePulse
      </p>
    </footer>
    <dialog class="dialog" data-id="dialog">
      <h2>Olá! Seja bem vindo ao CarePulse!</h2>
      <p>Por favor, use estes dados para fazer login:</p>
      <p>Email: email@email.com</p>
      <p>Password: 123456</p>
      <button class="btn btn-primary mt-2" data-id="close-dialog">Fechar</button>
    </dialog>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="index.js"></script>
  </body>
</html>
